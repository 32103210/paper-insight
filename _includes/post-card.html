<article class="post-card">
  <div class="post-card-header">
    <h3 class="post-card-title">
      <a href="{{ include.url }}">{{ include.title }}</a>
    </h3>
    <span class="post-card-date">{{ include.date }}</span>
  </div>
  <div class="post-card-meta">
    {% if include.arxiv_id %}
    <span class="arxiv-id">arXiv: {{ include.arxiv_id }}</span>
    {% endif %}
    {% if include.tags %}
    <div class="post-card-tags">
      {% for tag in include.tags %}
      <span class="post-card-tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
  {% if include.excerpt %}
  <p class="post-card-excerpt">{{ include.excerpt }}</p>
  {% endif %}
</article>
