name: Daily Paper Insight

on:
  schedule:
    # 每天 UTC 1:00 = 北京时间 9:00
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  analyze-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run crawler and analyzer
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          ARXIV_DAYS_BACK: "2"
          ARXIV_MAX_RESULTS: "20"
        run: |
          set -e

          # 设置默认 URL
          if [ -z "$MINIMAX_BASE_URL" ]; then
            export MINIMAX_BASE_URL="https://api.minimax.io/v1"
          fi

          # 运行爬虫并保存输出
          python scripts/crawler.py 2>&1 | tee crawler_output.txt

          # 打印爬虫输出的前30行（非JSON部分）用于调试
          head -30 crawler_output.txt | grep -v "---PAPERS_JSON---\|---END_JSON---" || true

          # 从输出中提取 JSON 并运行分析器
          grep -A 1000 -- "---PAPERS_JSON---" crawler_output.txt | grep -B 1000 -- "---END_JSON---" | sed '1d;$d' | python scripts/analyzer.py --parallel

      - name: Commit and push
        run: |
          # 检查是否有新分析或去重状态更新
          CHANGED_FILES=$(git status --short -- _posts/ processed_ids.txt | grep -v ".gitkeep" || true)
          if [ -n "$CHANGED_FILES" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add _posts/
            if [ -f processed_ids.txt ]; then
              git add processed_ids.txt
            fi
            git commit -m "feat: daily paper analysis $(date +'%Y-%m-%d')"
            # Pull and rebase to handle concurrent runs
            git pull --rebase origin main
            git push
          else
            echo "No new papers to commit"
          fi

      - name: Trigger Benchmark Update
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'benchmark-update.yml',
              ref: 'refs/heads/main'
            })
