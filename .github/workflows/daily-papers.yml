name: Daily Paper Insight

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # 每天 UTC 1:00 = 北京时间 9:00
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: '回看最近多少天的 arXiv 论文'
        required: false
        default: '2'
      max_results:
        description: '最多处理多少篇候选论文'
        required: false
        default: '20'

jobs:
  analyze-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run crawler and analyzer
        id: analyze
        continue-on-error: true
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          ARXIV_DAYS_BACK: ${{ github.event_name == 'workflow_dispatch' && inputs.days_back || '2' }}
          ARXIV_MAX_RESULTS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_results || '20' }}
        run: |
          set -euo pipefail

          # 设置默认 URL
          if [ -z "$MINIMAX_BASE_URL" ]; then
            export MINIMAX_BASE_URL="https://api.minimaxi.com/v1"
          fi

          # 运行爬虫并保存输出
          python scripts/crawler.py 2>&1 | tee crawler_output.txt

          # 打印爬虫输出的前30行（非JSON部分）用于调试
          head -30 crawler_output.txt | grep -v -e '---PAPERS_JSON---' -e '---END_JSON---' || true

          ANALYZER_ARGS=(--parallel)
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            ANALYZER_ARGS=()
          fi

          # 从输出中提取 JSON 并运行分析器
          grep -A 1000 -- "---PAPERS_JSON---" crawler_output.txt | grep -B 1000 -- "---END_JSON---" | sed '1d;$d' | python scripts/analyzer.py "${ANALYZER_ARGS[@]}"

      - name: Commit and push
        if: ${{ always() && steps.analyze.outcome != 'cancelled' }}
        run: |
          # 检查是否有新分析或去重状态更新
          CHANGED_FILES=$(git status --short -- _posts/ processed_ids.txt | grep -v ".gitkeep" || true)
          if [ -n "$CHANGED_FILES" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add _posts/
            if [ -f processed_ids.txt ]; then
              git add processed_ids.txt
            fi
            git commit -m "feat: daily paper analysis $(date +'%Y-%m-%d')"
            # Pull and rebase to handle concurrent runs
            git pull --rebase origin main
            git push
          else
            echo "No new papers to commit"
          fi

      - name: Fail if analysis failed completely
        if: ${{ steps.analyze.outcome == 'failure' }}
        run: exit 1
