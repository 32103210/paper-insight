name: Daily Paper Insight

on:
  schedule:
    # 每天 UTC 1:00 = 北京时间 9:00
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  analyze-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run crawler
        id: crawler
        run: |
          python scripts/crawler.py > crawler_output.txt 2>&1
          cat crawler_output.txt

      - name: Extract papers JSON
        id: extract
        run: |
          # 从 crawler 输出中提取 JSON
          JSON_OUTPUT=$(grep -A 1000 "---PAPERS_JSON---" crawler_output.txt | grep -B 1000 "---END_JSON---" | sed '1d;$d')
          echo "papers_json=$JSON_OUTPUT" >> $GITHUB_OUTPUT
          echo "papers_json: $JSON_OUTPUT"

      - name: Run analyzer
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL || 'https://api.minimax.chat/v1' }}
        run: |
          # 将 JSON 传递给 analyzer
          JSON_OUTPUT=$(grep -A 1000 "---PAPERS_JSON---" crawler_output.txt | grep -B 1000 "---END_JSON---" | sed '1d;$d')
          echo "$JSON_OUTPUT" | python scripts/analyzer.py

      - name: Check for new files
        id: new-files
        run: |
          git status --short _posts/

      - name: Commit and push
        if: steps.new-files.outputs.stdout != ''
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _posts/
          git commit -m "feat: daily paper analysis $(date +'%Y-%m-%d')"
          git push
